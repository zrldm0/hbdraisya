<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>20th Birthday</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;700&display=swap" rel="stylesheet">
<style>

*{margin:0;padding:0;box-sizing:border-box}
html{scroll-behavior:smooth}
body{font-family:'Cormorant Garamond',serif;overflow-x:hidden}
section{min-height:100vh}

.hero{position:relative;height:100vh}
.bg{width:100%;height:100%;object-fit:cover}
.dark{position:absolute;inset:0;background:rgba(0,0,0,.35)}
.hero-content{
  position:absolute;
  left:8%;
  bottom:15%;
  color:white;
}
.hero-content h1{font-size:5rem;font-weight:300}
.age{font-size:8rem;font-style:italic}

.collage-section{
  position:relative;
  overflow:hidden;
  background:#111;
  min-height:100vh;
}
#collage{
  display:grid;
  grid-template-columns:repeat(5,1fr);
  gap:12px;
  padding:20px;
  animation:zoom 20s linear infinite alternate;
}
#collage img{
  width:100%;
  height:220px;
  object-fit:cover;
  border:8px solid white;
}
.collage-overlay{
  position:absolute;
  inset:0;
  background:rgba(0,0,0,.5);
}
.center-text{
  position:absolute;
  inset:0;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  color:white;
  text-align:center;
}
.big{
  font-size:8rem;
  font-style:italic;
}

.rank-section{
  padding:60px;
  background:#dfe9f7;
}
.rank-section h2{font-size:5rem}
.rank-section h3{font-size:2rem;margin-bottom:30px}
.rank-grid{
  display:flex;
  gap:40px;
  align-items:center;
}
.note{
  background:white;
  padding:30px;
  max-width:450px;
  box-shadow:0 10px 25px rgba(0,0,0,.2);
}
.photos{
  display:flex;
  gap:20px;
  flex-wrap:wrap;
}
.polaroid{
  width:220px;
  background:white;
  padding:10px;
  box-shadow:0 10px 20px rgba(0,0,0,.2);
  object-fit:cover;
  height:260px;
}
.rot1{transform:rotate(-8deg)}
.rot2{transform:rotate(6deg)}
.rot3{transform:rotate(-3deg)}

.letter-section{
  display:flex;
  min-height:100vh;
}
.video-box,.letter{width:50%}
.video-box video{width:100%;height:100%;object-fit:cover}
.letter{
  padding:50px;
  font-size:1.4rem;
  line-height:1.7;
}

.reveal{
  opacity:0;
  transform:translateY(60px);
  transition:1s;
}
.reveal.show{
  opacity:1;
  transform:none;
}

#musicBtn{
  position:fixed;
  right:20px;
  bottom:20px;
  width:60px;
  height:60px;
  border:none;
  border-radius:50%;
  font-size:24px;
  cursor:pointer;
  background:white;
  box-shadow:0 4px 15px rgba(0,0,0,.2);
  z-index:999;
}

@keyframes zoom{
  from{transform:scale(1)}
  to{transform:scale(1.15)}
}

@media(max-width:768px){
  .hero-content h1{font-size:3rem}
  .age{font-size:5rem}
  #collage{grid-template-columns:repeat(2,1fr)}
  #collage img{height:150px}
  .big{font-size:5rem}
  .rank-grid,.letter-section{flex-direction:column}
  .video-box,.letter{width:100%}
  .polaroid{width:130px;height:160px}
  .rank-section{padding:25px}
}

</style>
</head>
<body>

<section class="hero">
  <img id="coverPhoto" class="bg" alt="cover">
  <div class="dark"></div>
  <div class="hero-content reveal">
    <h1>HAPPY<br>BIRTHDAY!</h1>
    <div class="age">20th</div>
    <p>June 24, 2026</p>
  </div>
</section>

<section class="collage-section">
  <div id="collage"></div>
  <div class="collage-overlay"></div>
  <div class="center-text reveal">
    <div class="big">what</div>
    <h2>things you get when<br>you turn</h2>
    <div class="big">20</div>
  </div>
</section>

<section class="rank-section reveal">
  <h2>Rank 2</h2>
  <h3>Through Consistency!!</h3>
  <div class="rank-grid">
    <div class="note">
      <h4>Pesan</h4>
      <p>Keja sayang Raisya.</p>
    </div>
    <div class="photos">
      <img id="p1" class="polaroid rot1" alt="foto 1">
      <img id="p2" class="polaroid rot2" alt="foto 2">
      <img id="p3" class="polaroid rot3" alt="foto 3">
    </div>
  </div>
</section>

<section class="letter-section">
  <div class="video-box reveal">
    <video controls autoplay muted loop>
      <source id="videoSource">
    </video>
  </div>
  <div class="letter reveal">
    <h2>Happy Birthday</h2>
    <p>gua gatau ini tulis apaan.</p>
  </div>
</section>

<button id="musicBtn">♪</button>
<audio id="bgMusic" loop></audio>

<script>

// https://drive.google.com/file/d/1oEHueOKhFrEuQAR1EKEAvQNo7ZrQ_60W/view?usp=sharing
// =====================================================

// --- FOTO COVER (1 foto) ---
const coverPhoto = "https://i.ibb.co.com/Mxg4hFwg/original-2026-03-30-201948-EB1-FCD6007-D5.jpghttps://ibb.co.com/LX0WPVj0";

// --- FOTO COLLAGE (isi sebanyak yang kamu mau, minimal 10 supaya penuh) ---
// Setiap foto akan ditampilkan 1x secara berurutan, tidak berulang kecuali
// foto habis (collage butuh banyak slot, jadi akan loop dari awal jika kurang)
const collagePhotos = [
  "https://i.ibb.co.com/3ywbq8Jc/IMG-9957.jpg",
  "https://i.ibb.co.com/mF0f6spF/IMG-1464.jpg",

  "https://i.ibb.co.com/HLQpR6W2/fa994086-5289-40cf-ab53-cf9263825554.jpg",

  "https://ibb.co.com/5W0WZ3vH",
  "https://i.ibb.co.com/99wTvv03/e7c52fca-944f-47d2-989b-568ee609aa2f.jpg",
  "https://ibb.co.com/ns8Jm9Py",
  "https://ibb.co.com/B5QV9FRn",
  "https://i.ibb.co.com/Gfx9Fbpb/c72d712a-7606-4774-a0ab-819a808307c6.jpg",
  "https://i.ibb.co.com/G4BwWZrD/c4190145-abd0-4ee1-bcdd-6cf29d20371b.jpg",
  "https://i.ibb.co.com/tpJrQ6HN/a0f90afb-cfa9-482b-9b2b-d5c29dec4c90.jpg",
  "https://i.ibb.co.com/wZS3yR46/a2e49d3d-e9e8-4451-8b12-771d44732d83.jpg",
  "https://i.ibb.co.com/XZQWqBHt/34541cd5-a5ae-43d2-875b-ab64873cc44d.jpg",
  "https://i.ibb.co.com/99wTvv03/e7c52fca-944f-47d2-989b-568ee609aa2f.jpg",
  "https://ibb.co.com/ns8Jm9Py",
  "https://ibb.co.com/B5QV9FRn",
  "https://i.ibb.co.com/Gfx9Fbpb/c72d712a-7606-4774-a0ab-819a808307c6.jpg",
  "https://i.ibb.co.com/G4BwWZrD/c4190145-abd0-4ee1-bcdd-6cf29d20371b.jpg",

  "https://i.ibb.co.com/wZS3yR46/a2e49d3d-e9e8-4451-8b12-771d44732d83.jpg",
  "https://i.ibb.co.com/XZQWqBHt/34541cd5-a5ae-43d2-875b-ab64873cc44d.jpg",
  "https://i.ibb.co.com/99wTvv03/e7c52fca-944f-47d2-989b-568ee609aa2f.jpg",

  "https://ibb.co.com/B5QV9FRn",
  "https://i.ibb.co.com/Gfx9Fbpb/c72d712a-7606-4774-a0ab-819a808307c6.jpg",
  "https://i.ibb.co.com/G4BwWZrD/c4190145-abd0-4ee1-bcdd-6cf29d20371b.jpg",

  "https://i.ibb.co.com/XZQWqBHt/34541cd5-a5ae-43d2-875b-ab64873cc44d.jpg",

  // Tambah terus di sini...
];

// --- FOTO POLAROID di section Rank (3 foto berbeda) ---
const polaroidPhotos = [
  "https://i.ibb.co.com/SWghfXF/0c014125-84cc-474f-a78a-1b83cde0fcc9.jpg",
  "https://i.ibb.co.com/SXZfYMt9/23685ef1-0a7a-41c6-81a9-dc4e3cee465c.jpg",
  "https://i.ibb.co.com/nNv2Gf3x/bca7ab67-2765-4d42-af6d-2fe86ee32ba6.jpg",
];

// --- VIDEO ---
// Untuk video Google Drive, ubah link share jadi:
// https://drive.google.com/uc?export=download&id=FILE_ID
const videoUrl = "https://drive.google.com/uc?export=download&id=GANTI_DENGAN_VIDEO_FILE_ID";

// --- MUSIK (opsional) ---
// Bisa pakai link langsung ke file .mp3
// Contoh dari Google Drive: "https://drive.google.com/uc?export=download&id=FILE_ID_MUSIK"
const musicUrl = "https://drive.google.com/file/d/1lU8DLy6dUnBWkNklQxAYYrikiEedddS0/view?usp=drive_link"; // Isi jika ada, kosongkan jika tidak

// =====================================================
// KODE (tidak perlu diubah di bawah ini)
// =====================================================

// Cover photo
document.getElementById('coverPhoto').src = coverPhoto;

// Polaroid photos
document.getElementById('p1').src = polaroidPhotos[0];
document.getElementById('p2').src = polaroidPhotos[1];
document.getElementById('p3').src = polaroidPhotos[2];

// Collage — isi 40 slot, urut dari awal, baru wrap jika foto habis
const collage = document.getElementById('collage');
const TOTAL_SLOTS = 40;
for (let i = 0; i < TOTAL_SLOTS; i++) {
  const img = document.createElement('img');
  img.src = collagePhotos[i % collagePhotos.length]; // wrap hanya jika foto < 40
  img.alt = `foto ${i + 1}`;
  collage.appendChild(img);
}

// Video
document.getElementById('videoSource').src = videoUrl;
document.querySelector('video').load();

// Musik
const bgMusic = document.getElementById('bgMusic');
if (musicUrl) {
  bgMusic.src = musicUrl;
}
const musicBtn = document.getElementById('musicBtn');
let playing = false;
musicBtn.addEventListener('click', () => {
  if (!musicUrl) return;
  if (playing) {
    bgMusic.pause();
    musicBtn.textContent = '♪';
  } else {
    bgMusic.play();
    musicBtn.textContent = '⏸';
  }
  playing = !playing;
});

// Scroll reveal
const observer = new IntersectionObserver(entries => {
  entries.forEach(entry => {
    if (entry.isIntersecting) {
      entry.target.classList.add('show');
    }
  });
});
document.querySelectorAll('.reveal').forEach(el => observer.observe(el));

</script>
</body>
</html>
